<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Side bar</title>
    <link rel="stylesheet" href="../../css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>
        .nav-item > a{
            color: white;
        }
        .nav-item > a:hover{
            color: rgb(0, 0, 0);
        }

        @media screen and (min-width : 577px) and (max-width: 992px){
            .offcanvas{
                width: 50%;
            }
        }
    </style>
</head>
<body>


    <!-- Sidebar -->

    <button class="border-0 bg-white m-1 " type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasScrolling"
        aria-controls="offcanvasScrolling" aria-label="btn"><i class="bi bi-list fs-2 text-black fw-bolder"></i></button>
    
    <div class="offcanvas offcanvas-start" data-bs-scroll="true" data-bs-backdrop="false" tabindex="-1"
        id="offcanvasScrolling" aria-labelledby="offcanvasScrollingLabel">
        <div class="offcanvas-header border-bottom bg-primary text-light">
            <h1>Your Name</h1>
            <button type="button" class="btn-close bg-light" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body bg-primary">
            <ul class="navbar-nav justify-content-end flex-grow-1 pe-3 text-light fs-4">
                <li class="nav-item m-0">
                    <a class="nav-link active" aria-current="page" href="#">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">About Us</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Services</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Contact</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Map</a>
                </li>
            </ul>
        </div>
    </div>


    <script src="../../js/bootstrap.min.js"></script>
</body>
</html>
