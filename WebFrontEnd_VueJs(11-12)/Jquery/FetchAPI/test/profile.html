<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link rel="stylesheet" href="../../node_modules/bootstrap/dist/css/bootstrap.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>
    <div class="d-flex mt-5 justify-content-center align-items-center">
        <img id="loading" src="https://www.icegif.com/wp-content/uploads/2023/07/icegif-1260.gif" alt="">
    </div>
   

    <!-- Main Card -->
<div id="main-card" class="flex flex-wrap gap-6 justify-center bg-gray-100 py-10 px-4">

    

</div>
</body>
<script>
    $.ajax({
        url: "https://fakestoreapi.com/products",
        type: "GET",
        beforeSend: function () {
            $("#loading").show();
        },
        success: function (response) {
            console.log("Request data success.");
            console.log("This is data : ", response);
            $("#loading").hide();
            let MainCard = "";

            response.forEach(item => {
                MainCard +=
                `
                    
                    <div
        class="group relative w-full max-w-[280px] flex flex-col overflow-hidden rounded-2xl bg-white shadow-md transition-all duration-300 hover:-translate-y-2 hover:shadow-xl">

        <div
            class="absolute left-3 top-3 z-10 rounded-full bg-red-500 px-3 py-1 text-[10px] font-bold text-white shadow-sm">
            -20% OFF
        </div>

        <div class="relative aspect-[4/5] w-full overflow-hidden bg-gray-200">
            <img src="${item.image}" alt="Product"
                class="h-full w-full object-cover transition-transform duration-500 group-hover:scale-110" />

            <div
                class="absolute inset-0 flex items-center justify-center bg-black/20 opacity-0 transition-opacity duration-300 group-hover:opacity-100">
                <button
                    class="rounded-full bg-white px-4 py-2 text-sm font-semibold text-gray-900 shadow-lg hover:bg-gray-100 transition-transform active:scale-95">
                    មើលបន្ថែម
                </button>
            </div>
        </div>

        <div class="flex flex-1 flex-col p-5">
            <div class="mb-1 text-[10px] uppercase tracking-widest text-gray-400 font-medium">${item.category}</div>

            <h2
                class="mb-2 text-base font-bold text-gray-800 transition-colors group-hover:text-orange-500 line-clamp-2 h-[48px] overflow-hidden leading-tight">
                ${item.title}
            </h2>

            <div class="mb-4 flex items-center text-yellow-400">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 fill-current" viewBox="0 0 20 20">
                    <path
                        d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
                </svg>
                <span class="ml-1 text-xs font-bold text-gray-700">4.8</span>
                <span class="ml-1 text-[10px] text-gray-400">(120)</span>
            </div>

            <div class="mt-auto flex items-center justify-between pt-2">
                <div class="flex flex-col">
                    <span class="text-lg font-black text-gray-900">$${item.price}</span>
                </div>

                <button
                    class="group/btn flex h-9 w-9 items-center justify-center rounded-xl bg-orange-500 text-white transition-all hover:bg-orange-600 active:scale-90 shadow-md shadow-orange-200">
                    <svg xmlns="http://www.w3.org/2000/svg"
                        class="h-5 w-5 transition-transform group-hover/btn:rotate-90" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                    </svg>
                </button>
            </div>
        </div>
    </div>
                `;
            })
            $("#main-card").html(MainCard);
        },
        error: function () {
            console.log("Error", error);
        },
        complete: function () {
            console.log("Request data success.");
            $("#loading").hide();
        }
    });
</script>

</html>
