<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <div class="container my-5">
        <div class="row gap-5 justify-content-center" id="cards">

        </div>
    </div>
    <!-- <h1 id="title"></h1> -->
</body>
<script>

    const name = document.getElementById('title');
    const cards = document.getElementById('cards');
    async function  fetchData(){
        // async : អនុញ្ញាតឲ្យ  API send data ឲ្យអស់ចូល fetchData();
        // await : បង្អាក់ការរងចាំ
        //method : GET, POST , PUT, DELETE
        const respone = await fetch("https://fakestoreapi.com/products");
        const data = await respone.json();
        console.log(data);

        // data.forEach(item=>{
        //     name.innerHTML+=`${item.title}`
        // })

        data.forEach(item=>{
        cards.innerHTML +=`
        <div class="col-6 col-md-4 col-lg-3 mb-4">
    <div class="card h-100 border shadow-sm rounded-3 overflow-hidden">

        <img src="${item.image}" 
             class="card-img-top p-2" 
             alt="${item.title}" 
             style="height: 200px; object-fit: contain;">

        <div class="card-body d-flex flex-column p-3">
            <h6 class="card-title fw-bold text-dark mb-2 text-truncate">
                ${item.title}
            </h6>
            
            <p class="card-text small text-muted mb-3">
                ${item.description || 'Brief product description goes here.'}
            </p>

            <div class="mt-auto">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <span class="fw-bold text-primary">$${item.price}</span>
                    <span class="badge bg-light text-dark border">New</span>
                </div>
                <a href="#" class="btn btn-primary w-100 rounded-pill shadow-sm">
                    <i class="bi bi-cart-plus me-1"></i> Add to Cart
                </a>
            </div>
        </div>
    </div>
</div>
            `;
        })
        
    }
    fetchData();

</script>
</html>
