<head>

<style>

        background: linear-gradient( #00c6ff , #0072ff);

        width: 100%;
    }
    .main-sidebar .sidebar .menu-links .link-item{
        cursor: pointer;
        transition: transform 0.3s;
    }
    .main-sidebar .sidebar .menu-links .link-item:hover{
        background-color: gainsboro;
        transform: scale(1.1);
    }
</style>
<body>

            <div class="logo"><h1 class="text-light">Management System</h1></div>

            </div>
        </nav>
    </header>

    <div class="main-sidebar">

            <ul class="menu-links list-unstyled px-5">

                <li class="py-3 fw-medium fs-5 border border-1 my-3 px-3 rounded-4 link-item "><a class="text-decoration-none text-black" href=""><i class="bi bi-people"></i> Students</a></li>

                <li class="py-3 fw-medium fs-5 border border-1 my-3 px-3 rounded-4 link-item "><a class="text-decoration-none text-black" href=""><i class="bi bi-calendar-check"></i> Attendance</a></li>

    </script>
