        // Do/While loop
        do{
            let ch;
            ch = prompt("Please choose (y/n/e):");

            switch(ch){
                case 'y':{
                    document.write("output Yes");
                    
                }
                case 'n':{
                    document.write("output No");
                    break;
                }
                case 'e':{
                    document.write("Exited...");
                    break;
                }
                default: document.write("invalid option!");
            }
        }while(ch!="e");
    </script>
