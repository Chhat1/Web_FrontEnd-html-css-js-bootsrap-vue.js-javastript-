<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // ==================[ Arrow Function ]==========================
        // normal function: function example(){}
        // arrow functiopn: example const name_function ()=>{}
        const ArrowFunction = () => {
            document.write("<h1>This is Arrow function</h1>");
        }
        ArrowFunction(); // call function

        //Arrow function with return function

        const Sum = (a,b) => a + b; // is return a + b
        document.write("<h1> 1 + 2  = "+Sum(1,2)+"</h1>");

        //================================================================



        

        




    </script>
</body>
</html>
