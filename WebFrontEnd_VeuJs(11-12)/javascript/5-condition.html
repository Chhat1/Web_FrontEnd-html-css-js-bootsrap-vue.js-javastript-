    <script>
        // if else if statement
        const num1 = prompt("Enter num1=");
        const num2 = prompt("Enter num2=");

        if(num1 > num2){
            document.write("<h1>This is num1 bigger than num2</h1>");
        }else if(num1 == num2){
            document.write("<h1>Num1 = Num2</h1>")
        }else{
            document.write("<h1>Num2 bigger than num1</h1>")
        }
    </script>
