<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignIn</title>
    <link rel="stylesheet" href="signIn.css">
</head>
<body>
    <div class="container">
        <div class="sign-in">
            <div class="left">
                <img src="https://i.pinimg.com/736x/29/fa/92/29fa92b5adc5c103ae3005eda7eeda2b.jpg" alt="">
            </div>
            
            <div class="right">
                <h1>Sign In</h1>
                <p class="subtitle">Unlock your world.</p>
    
                <label>*Email</label><br>
                <input type="email" placeholder="Enter your email"><br><br>
    
                <label>*Password</label><br>
                <input type="password" placeholder="Enter your password">
                <br><br>
                <button class="Btnsignin">Sign In</button>
    
                <button class="Btncreate">
                    Create an account
                </button>
            </div>
    
        </div>
    </div>
</body>
</html>
