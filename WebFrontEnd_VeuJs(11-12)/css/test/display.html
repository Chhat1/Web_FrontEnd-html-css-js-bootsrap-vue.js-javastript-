<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display</title>
    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        .logo{
            text-align: center;
            background-color: skyblue;
            padding: 20px;
        }
        .menu-links{
            display: flex;
            list-style: none;
            justify-content: center;
            padding: 20px;
            margin-top: 10px;
            background-color: skyblue;
            gap: 20px;
        }
        .feature{
            background-color: skyblue;
            margin-top: 20px;
            width: 100%;
            height: 200px;
            text-align: center;
            
        }
        .container-box{
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            margin-top: 20px;
        }
        .box{
            width: 300px;
            text-align: center;
            height: 300px;
            background-color: skyblue;
        }
        .footer{
            width: 100%;
            height: 180px;
            background-color: skyblue;
            text-align: center;
            margin-top: 50px;
        }
    </style>
</head>
<body>
    <div class="logo"><h1>Logo</h1></div>
    <ul class="menu-links">
        <li><a href="">Home</a></li>
        <li><a href="">Product</a></li>
        <li><a href="">Service</a></li>
        <li><a href="">About</a></li>
        <li><a href="">Contact</a></li>
    </ul>
    <div class="feature">Feature</div>
    <div class="container-box">
        <div class="box">Colum One</div>
        <div class="box">Colum Two</div>
        <div class="box">Colum Three</div>
    </div>
    <footer class="footer">© Copyright 2026</footer>
</body>
</html>
