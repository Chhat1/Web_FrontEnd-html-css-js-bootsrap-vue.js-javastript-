<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        header, nav, footer{
            width: 100%;
            height: 15vh;
            border: 5px solid white;
        }
        header, nav, footer{
            display: flex;
            justify-content: center;
            color: white;
            font-size: 25px;
            align-items: center;
        }
        header{
            background-color: red;
        }
        nav{
            background-color: rgb(8, 9, 90);
        }
        footer{
            background-color: rgb(86, 86, 86);
        }
        main{
            width: 100%;
            display: flex;
            height: 55vh;
            background-color: pink;
            font-size: 25px;
            color: white;
        }
        main > .left{
            width: 60%;
            height: 100%;
            background-color: orange;
        }
        main > .left> .left-top{
            height: 50%;
            width: 100%;
            justify-content: center;
            display: flex;
            align-items: center;
            background-color: chartreuse;
            border: 5px solid white;
        }
        main > .left> .left-bottom{
            height: 50%;
            width: 100%;
            background-color: rgb(0, 147, 170);
            display: flex;
            justify-content: center;
            align-items: center;
            border: 5px solid white;
        }
        main > .right{
            width: 40%;
            border: 5px solid white;
            height: 100%;
            background-color: aqua;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>
    <header>
        Header
    </header>
    <nav>
        Nav
    </nav>
    <main>
        <div class="left">
            <div class="left-top">
                Section
            </div>
            <div class="left-bottom">
                Article
            </div>
        </div>
        <div class="right">
            Aside
        </div>
    </main>
    <footer>Footer</footer>
</body>
</html>
