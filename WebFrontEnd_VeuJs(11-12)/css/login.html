<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.css">
</head>
<body>

    <div class="main-login">
        <div class="login">
            <h1>Login</h1>
            <form class="login-form">
                <input type="email" placeholder="Email"><br><br>
                <input type="password" placeholder="Password"><br><br>
                <span><i class="ri-eye-off-line"></i></span>
                <a href="https://www.facebook.com/?ref=homescreenpwa">Forgot password?</a>
            </form>
            <div class="btn-login">
                <button>Login</button>
                <p>Don't have an account?<span><a href="">Signup</a></span></p>
            </div>
            <div class="main-line">
                <span class="line"></span>
                <span class="text">Or</span>
                <span class="line"></span>
            </div>
            <div class="media-login">
                <button class="facebook"><i class="ri-facebook-line"></i> Login with Facebook</button><br><br>
                <button class="google"><i class="ri-google-fill"></i> Login with Google</button>
            </div>
        </div>
        <div class="login">
            <h1>Signup</h1>
            <form class="login-form">
                <input type="email" placeholder="Email"><br><br>
                <input type="password" placeholder="Password"><br><br>
                <input type="password" placeholder="Confirm Password"><br><br>
                
            </form>
            <div class="btn-login">
                <button>Signup</button>
                <p>Already have account?<span><a href="">Login</a></span></p>
            </div>
            <div class="main-line">
                <span class="line"></span>
                <span class="text">Or</span>
                <span class="line"></span>
            </div>
            <div class="media-login">
                <button class="facebook"><i class="ri-facebook-line"></i> Login with Facebook</button><br><br>
                <button class="google"><i class="ri-google-fill"></i> Login with Google</button>
            </div>
        </div>
    </div>
</body>
</html>
