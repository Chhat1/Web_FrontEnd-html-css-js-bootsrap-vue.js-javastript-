<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOX</title>
    <link rel="stylesheet" href="../css/bootstrap.min.css">
</head>
<body>
    <h1 class="text-center bg-primary p-5 text-white text-uppercase">Create BOX</h1>


    <div class="container-fluid  bg-danger fs-3 text-white text-center">container: width 80%</div>
    <!-- container-fluid: take width: 100%;
    container : width80%; -->

    <h3 class="text-center mt-5 bg-primary p-5 text-white text-uppercase">12 column = width : 100% of body</h3>

    <div class="col-1  bg-success text-white fs-3 my-3">col-1</div>
    <div class="col-2  bg-success text-white fs-3 my-3">col-2</div>
    <div class="col-3  bg-success text-white fs-3 my-3">col-3</div>
    <div class="col-4  bg-success text-white fs-3 my-3">col-4</div>
    <div class="col-5  bg-success text-white fs-3 my-3">col-5</div>
    <div class="col-6  bg-success text-white fs-3 my-3">col-6</div>
    <div class="col-7  bg-success text-white fs-3 my-3">col-7</div>
    <div class="col-8  bg-success text-white fs-3 my-3">col-8</div>
    <div class="col-9  bg-success text-white fs-3 my-3">col-9</div>
    <div class="col-10 bg-success text-white fs-3 my-3">col-10</div>
    <div class="col-11 bg-success text-white fs-3 my-3">col-11</div>
    <div class="col-12 bg-success text-white fs-3 my-3">col-12</div>
    <br>
    <br>
    <h3 class="text-center mt-5 bg-primary p-5 text-white text-uppercase ju">Flex box</h3>
    <div class="container flex-wrap vh-100 bg-secondary d-flex align-items-center">
        <div class="d-flex align-items-center justify-content-center col-12 col-md-6 col-lg-4 p-5 h-25 bg-primary border border-5 fs-1 text-white border-white ">Item1</div>
        <div class="d-flex align-items-center justify-content-center col-12 col-md-6 col-lg-4 p-5 h-25 bg-primary border border-5 fs-1 text-white border-white">Item2</div>
        <div class="d-flex align-items-center justify-content-center col-12 col-md-6 col-lg-4 p-5 h-25 bg-primary border border-5 fs-1 text-white border-white">Item3</div>
    </div>

    <br><br><br>
    <div class="container mx-auto my-5 row">
        <div class="col-12 col-md-6  bg-danger p-5">col-6</div>
        <div class="col-12 col-md-6  bg-primary p-5">col-6</div>
    </div>
    <div class="container mx-auto my-5 row">
        <div class="col-12 col-md-6 col-lg-4 bg-danger p-5">col-6</div>
        <div class="col-12 col-md-6 col-lg-4 bg-primary p-5">col-6</div>
        <div class="col-12 col-md-6 col-lg-4 bg-success p-5">col-6</div>
    </div>
    <div class="container mx-auto my-5 row">
        <div class="col-12 col-md-6 col-lg-3 bg-danger p-5">col-6</div>
        <div class="col-12 col-md-6 col-lg-3 bg-primary p-5">col-6</div>
        <div class="col-12 col-md-6 col-lg-3 bg-success p-5">col-6</div>
        <div class="col-12 col-md-6 col-lg-3 bg-warning p-5">col-6</div>
    </div>
