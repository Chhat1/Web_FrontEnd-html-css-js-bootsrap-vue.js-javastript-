<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box</title>
    <link rel="stylesheet" href="../css/bootstrap.min.css">

</head>

<body>

    <div class="container-fluid">
        <div class="row">
            <div class="col-12 col-lg-6 bg-danger p-3 border border-5 border-white"></div>
            <div class="col-12 col-lg-6 bg-danger p-3 border border-5 border-white"></div>
        </div>

        <div class="row">
            <div class="col-12 p-5 bg-primary border border-5 border-white"></div>
        </div>

        <div class="row">
            <div class="col-12 col-lg-4 p-5 bg-success border border-5 border-white"></div>
            <div class="col-12 col-lg-4 p-5 bg-success border border-5 border-white"></div>
            <div class="col-12 col-lg-4 p-5 bg-success border border-5 border-white"></div>
        </div>

        <div class="row">
            <div class="col-12 col-md-6 col-lg-3 bg-secondary p-3 border border-5 border-white"></div>
            <div class="col-12 col-md-6 col-lg-3 bg-secondary p-3 border border-5 border-white"></div>
            <div class="col-12 col-md-6 col-lg-3 bg-secondary p-3 border border-5 border-white"></div>
            <div class="col-12 col-md-6 col-lg-3 bg-secondary p-3 border border-5 border-white"></div>
        </div>
    </div>

</body>

</html>
