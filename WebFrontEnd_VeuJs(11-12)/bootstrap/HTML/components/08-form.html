<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form </title>
    <link rel="stylesheet" href="../../css/bootstrap.min.css">
</head>
<body>
    <h2 class="text-center m-1 text-primary border-bottom">Form Design</h2>


    <form class=" h-auto p-4  m-5 border shadow-sm rounded-3 mx-auto" style="width: 35%;">
        <h3 class="text-center">Form Login</h3>

        <div class="form-group mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" placeholder="Enter Email">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" placeholder="Enter Password">
        </div>
        <div class="select-group">
            <label class="form-label">Select you personality</label>
            <select name="" id="" title="select" class="form-select">
                <option value="">Male</option>
                <option value="">Female</option>
            </select>
        </div>

        <div class="check-box my-3">
            <label class="form-check-inline">Remember Me</label>
            <input title="checkbox" class="form-check-input" type="checkbox">
        </div>

        <button class="btn btn-primary w-100">Save Customer</button>

    </form>



    <script src="../../js/bootstrap.min.js"></script>
</body>
</html>
