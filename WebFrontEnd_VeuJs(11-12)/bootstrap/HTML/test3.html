<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box</title>
    <link rel="stylesheet" href="../css/bootstrap.min.css">

</head>

<body>

    <div class="container-fluid py-5 px-3 px-md-5">
    
        <div class="row g-2 mb-2">
            <div class="col-3 col-md-2 bg-success py-4 border border-5 border-white"></div>
            <div class="col-9 col-md-10 bg-info py-4 border border-5 border-white"></div>
        </div>
    
        <div class="row g-2 mb-2">
            <div class="col-12 bg-warning py-5 border border-5 border-white">
                <div class="py-5"></div>
            </div>
        </div>
    
        <div class="row g-2">
            <div class="col-12 col-md-8 bg-secondary bg-opacity-50 py-5 border border-5 border-white">
                <div class="py-4"></div>
            </div>
    
            <div class="col-12 col-md-4">
                <div class="d-flex flex-column h-100">
                    <div class="bg-secondary p-3  border border-5 border-white"></div>
                    <div class="bg-secondary p-3  border border-5 border-white"></div>
                    <div class="bg-secondary p-3  border border-5 border-white"></div>
                    <div class="bg-secondary p-3  border border-5 border-white"></div>
                </div>
            </div>
        </div>
    
    </div>

</body>

</html>
